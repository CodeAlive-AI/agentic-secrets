version: 2

updates:
  - package-ecosystem: "cargo"
    directory: "/platform/windows"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    groups:
      cargo-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    groups:
      actions-security:
        applies-to: security-updates
        patterns:
          - "*"
