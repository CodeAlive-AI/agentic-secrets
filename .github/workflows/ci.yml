name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: SwiftPM and release gates
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Whitespace check
        run: git diff --check

      - name: Install gate dependencies
        run: brew install ripgrep

      - name: CI gates
        run: ./scripts/ci.sh

      - name: Tahoe compatibility
        run: ./scripts/tahoe_compatibility_check.sh
